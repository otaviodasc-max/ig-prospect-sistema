<title>Fluxo CRM</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{
    --page: #f9f9f7;
    --surface: #ffffff;
    --surface-sunken: #f2f2ef;
    --ink: #0b0b0b;
    --ink-2: #52514e;
    --ink-muted: #898781;
    --hairline: #e1e0d9;
    --border: rgba(11,11,11,0.10);
    --accent: #2a78d6;
    --accent-dark: #184f95;
    --accent-tint: #eaf2fc;
    --accent-2: #1baf7a;
    --good: #0ca30c;
    --good-text: #006300;
    --warning: #fab219;
    --warning-text: #8a5a00;
    --serious: #ec835a;
    --critical: #d03b3b;
    --critical-tint: #fbebea;
    --violet: #4a3aa7;
    --radius-s: 6px;
    --radius-m: 10px;
    --radius-l: 14px;
    --shadow-card: 0 1px 2px rgba(11,11,11,0.06), 0 1px 1px rgba(11,11,11,0.04);
    --shadow-pop: 0 12px 32px rgba(11,11,11,0.16), 0 2px 8px rgba(11,11,11,0.08);
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, monospace;
  }
  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; }
  body{
    font-family: var(--sans);
    background: var(--page);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  h1,h2,h3,h4{ margin:0; text-wrap: balance; font-weight: 700; letter-spacing: -0.01em; }
  p{ margin: 0; }
  button{ font-family: inherit; font-size: inherit; }
  input, select, textarea{ font-family: inherit; font-size: inherit; }
  a{ color: inherit; }
  ::selection{ background: var(--accent-tint); }
  .tabular{ font-variant-numeric: tabular-nums; }

  /* ---------- shell ---------- */
  .shell{ display:flex; min-height: 100vh; }

  .sidebar{
    width: 232px;
    flex: none;
    background: var(--ink);
    color: #eceae4;
    display:flex;
    flex-direction: column;
    padding: 18px 12px;
    gap: 4px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    padding: 6px 10px 20px 10px;
  }
  .brand-mark{
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    flex: none;
  }
  .brand-name{ font-weight: 800; font-size: 15.5px; color: #fff; letter-spacing: -0.01em; }
  .brand-sub{ font-size: 10.5px; color: #8f8d86; letter-spacing: 0.04em; text-transform: uppercase; margin-top: 1px; }

  .nav-group-label{
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #6f6e68; padding: 14px 12px 6px;
  }
  .nav-item{
    display:flex; align-items:center; gap:10px;
    padding: 8px 10px; border-radius: var(--radius-s);
    color: #cbc9c2; cursor: pointer; border:none; background:none; width:100%; text-align:left;
  }
  .nav-item:hover{ background: rgba(255,255,255,0.06); color:#fff; }
  .nav-item.active{ background: rgba(42,120,214,0.22); color:#fff; }
  .nav-item svg{ width:17px; height:17px; flex:none; opacity:0.9; }
  .nav-item .count{
    margin-left:auto; font-size: 11px; background: rgba(255,255,255,0.1);
    padding: 1px 7px; border-radius: 999px; color:#d8d6cf; font-variant-numeric: tabular-nums;
  }
  .nav-item.active .count{ background: rgba(255,255,255,0.22); color:#fff; }

  .sidebar-foot{
    margin-top: auto; padding: 10px; border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 11.5px; color: #7d7b74; line-height: 1.5;
  }

  .main{ flex:1; min-width:0; display:flex; flex-direction:column; }

  .topbar{
    height: 60px; flex:none; background: var(--surface); border-bottom: 1px solid var(--hairline);
    display:flex; align-items:center; gap: 14px; padding: 0 22px; position: sticky; top:0; z-index: 20;
  }
  .topbar h1{ font-size: 17px; }
  .search-box{
    flex:1; max-width: 380px; display:flex; align-items:center; gap:8px;
    background: var(--surface-sunken); border: 1px solid transparent; border-radius: var(--radius-m);
    padding: 7px 12px; color: var(--ink-muted);
  }
  .search-box input{ border:none; background:none; outline:none; width:100%; color: var(--ink); }
  .search-box svg{ width:15px; height:15px; flex:none; }
  .topbar-spacer{ flex:1; }
  .btn{
    display:inline-flex; align-items:center; gap:7px; border-radius: var(--radius-s);
    border: 1px solid var(--border); background: var(--surface); color: var(--ink);
    padding: 7px 13px; font-weight: 600; font-size: 13px; cursor:pointer; white-space:nowrap;
  }
  .btn:hover{ background: var(--surface-sunken); }
  .btn svg{ width: 15px; height:15px; }
  .btn-primary{ background: var(--accent); border-color: var(--accent); color:#fff; }
  .btn-primary:hover{ background: var(--accent-dark); }
  .btn-ghost{ border-color: transparent; background:none; }
  .btn-ghost:hover{ background: var(--surface-sunken); }
  .btn-danger{ color: var(--critical); }
  .btn-sm{ padding: 5px 10px; font-size: 12px; }
  .avatar{
    width:32px; height:32px; border-radius:50%; background: var(--accent-tint); color: var(--accent-dark);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12.5px; flex:none;
  }

  .view{ padding: 22px 26px 60px; max-width: 1360px; }
  .view-head{ display:flex; align-items:flex-end; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
  .view-head .eyebrow{ font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-muted); margin-bottom: 4px; }
  .view-head h2{ font-size: 22px; }
  .view-actions{ display:flex; gap: 8px; }

  /* ---------- cards / stat tiles ---------- */
  .card{
    background: var(--surface); border: 1px solid var(--hairline); border-radius: var(--radius-l);
    box-shadow: var(--shadow-card);
  }
  .stat-row{ display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
  .stat-tile{ padding: 16px 18px; display:flex; flex-direction:column; gap: 8px; }
  .stat-tile .label{ font-size: 12px; color: var(--ink-muted); font-weight:600; }
  .stat-tile .value{ font-size: 25px; font-weight: 800; letter-spacing: -0.01em; }
  .stat-tile .delta{ font-size: 12px; font-weight: 600; display:flex; align-items:center; gap:4px; }
  .delta.up{ color: var(--good-text); }
  .delta.down{ color: var(--critical); }
  .delta svg{ width:11px; height:11px; }

  .grid-2{ display:grid; grid-template-columns: 1.3fr 1fr; gap: 14px; align-items:start; }

  .panel{ padding: 18px 20px; }
  .panel h3{ font-size: 14.5px; margin-bottom: 3px; }
  .panel .sub{ font-size: 12px; color: var(--ink-muted); margin-bottom: 14px; }

  /* funnel chart */
  .funnel-row{ display:flex; align-items:center; gap: 12px; padding: 7px 0; }
  .funnel-row .stage-label{ width: 108px; flex:none; font-size: 12.5px; font-weight:600; color: var(--ink-2); }
  .funnel-track{ flex:1; background: var(--surface-sunken); border-radius: 999px; height: 20px; position: relative; overflow:hidden; }
  .funnel-fill{ height:100%; border-radius: 999px; display:flex; align-items:center; }
  .funnel-row .meta{ width: 128px; flex:none; text-align:right; font-size: 12px; color: var(--ink-muted); }
  .funnel-row .meta b{ color: var(--ink); font-weight:700; }

  /* bar chart (won per month) */
  .bars{ display:flex; align-items:flex-end; gap: 10px; height: 140px; padding: 4px 2px 0; }
  .bar-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end; position:relative; }
  .bar-col .bar{ width: 100%; max-width: 34px; background: var(--accent); border-radius: 4px 4px 0 0; position:relative; cursor:default; }
  .bar-col .bar:hover{ background: var(--accent-dark); }
  .bar-col .bar .tip{
    position:absolute; bottom: 100%; left:50%; transform: translateX(-50%); margin-bottom:6px;
    background: var(--ink); color:#fff; font-size: 11px; padding: 4px 7px; border-radius: 5px; white-space:nowrap;
    opacity:0; pointer-events:none; transition: opacity .1s;
  }
  .bar-col .bar:hover .tip{ opacity:1; }
  .bar-col .x-label{ font-size: 11px; color: var(--ink-muted); }

  .today-list{ display:flex; flex-direction:column; }
  .today-item{ display:flex; align-items:center; gap:10px; padding: 9px 0; border-bottom: 1px solid var(--hairline); }
  .today-item:last-child{ border-bottom:none; }
  .today-item .chk{ width:16px; height:16px; border-radius:4px; border: 1.5px solid var(--ink-muted); flex:none; cursor:pointer; }
  .today-item .chk.done{ background: var(--good); border-color: var(--good); }
  .today-item .txt{ flex:1; font-size: 13px; }
  .today-item .txt .rel{ font-size: 11.5px; color: var(--ink-muted); }
  .today-item.overdue .txt .rel{ color: var(--critical); font-weight:600; }
  .empty-note{ font-size: 12.5px; color: var(--ink-muted); padding: 8px 0; }

  /* ---------- pill / chip ---------- */
  .pill{ display:inline-flex; align-items:center; gap:5px; font-size: 11.5px; font-weight:700; padding: 2px 9px; border-radius: 999px; }
  .pill.good{ background: #e6f6e6; color: var(--good-text); }
  .pill.critical{ background: var(--critical-tint); color: var(--critical); }
  .pill.warning{ background: #fff4dc; color: var(--warning-text); }
  .pill.neutral{ background: var(--surface-sunken); color: var(--ink-2); }
  .pill.accent{ background: var(--accent-tint); color: var(--accent-dark); }

  /* ---------- kanban ---------- */
  .board{ display:flex; gap: 14px; overflow-x: auto; padding-bottom: 10px; }
  .col{ width: 264px; flex: none; display:flex; flex-direction:column; background: var(--surface-sunken); border-radius: var(--radius-l); }
  .col-head{ padding: 12px 13px 10px; display:flex; align-items:center; gap:8px; }
  .col-head .dot{ width:9px; height:9px; border-radius:50%; flex:none; }
  .col-head .name{ font-weight:700; font-size:13px; flex:1; }
  .col-head .n{ font-size: 11.5px; color: var(--ink-muted); font-variant-numeric: tabular-nums; }
  .col-sum{ padding: 0 13px 10px; font-size: 11.5px; color: var(--ink-muted); font-variant-numeric: tabular-nums; }
  .col-body{ flex:1; padding: 0 8px 8px; display:flex; flex-direction:column; gap:8px; min-height: 80px; }
  .col-body.drag-over{ background: var(--accent-tint); border-radius: var(--radius-m); }
  .deal-card{
    background: var(--surface); border:1px solid var(--hairline); border-radius: var(--radius-m);
    padding: 11px 12px; cursor: grab; box-shadow: var(--shadow-card); display:flex; flex-direction:column; gap:6px;
  }
  .deal-card:active{ cursor: grabbing; }
  .deal-card.dragging{ opacity: 0.4; }
  .deal-card .title{ font-weight:700; font-size: 13px; }
  .deal-card .value{ font-size: 13px; font-weight:700; color: var(--accent-dark); font-variant-numeric: tabular-nums; }
  .deal-card .who{ font-size: 12px; color: var(--ink-2); }
  .deal-card .foot{ display:flex; align-items:center; justify-content:space-between; margin-top:2px; }
  .deal-card .due{ font-size: 11px; color: var(--ink-muted); }
  .deal-card .due.late{ color: var(--critical); font-weight:600; }

  /* ---------- tables ---------- */
  .table-wrap{ overflow-x:auto; }
  table{ width:100%; border-collapse: collapse; font-size: 13px; }
  th{ text-align:left; font-size: 11.5px; text-transform:uppercase; letter-spacing:0.04em; color: var(--ink-muted); font-weight:700; padding: 10px 14px; border-bottom: 1px solid var(--hairline); white-space:nowrap; }
  td{ padding: 11px 14px; border-bottom: 1px solid var(--hairline); vertical-align: middle; }
  tbody tr:hover{ background: var(--surface-sunken); }
  tbody tr{ cursor:pointer; }
  td.num{ font-variant-numeric: tabular-nums; text-align:right; }
  th.num{ text-align:right; }
  .row-title{ font-weight:700; }
  .row-sub{ font-size:12px; color: var(--ink-muted); }

  /* ---------- modal ---------- */
  .overlay{ position:fixed; inset:0; background: rgba(11,11,11,0.42); display:flex; align-items:center; justify-content:center; z-index: 100; padding: 24px; }
  .modal{ background: var(--surface); border-radius: var(--radius-l); box-shadow: var(--shadow-pop); width: 100%; max-width: 560px; max-height: 88vh; display:flex; flex-direction:column; }
  .modal.wide{ max-width: 760px; }
  .modal-head{ padding: 18px 22px; border-bottom: 1px solid var(--hairline); display:flex; align-items:center; justify-content:space-between; }
  .modal-head h3{ font-size: 16px; }
  .modal-body{ padding: 20px 22px; overflow-y:auto; }
  .modal-foot{ padding: 14px 22px; border-top: 1px solid var(--hairline); display:flex; justify-content:flex-end; gap:8px; }
  .icon-btn{ border:none; background:none; cursor:pointer; color: var(--ink-muted); padding:4px; border-radius:6px; display:flex; }
  .icon-btn:hover{ background: var(--surface-sunken); color: var(--ink); }
  .icon-btn svg{ width:18px; height:18px; }

  .field{ margin-bottom: 14px; }
  .field label{ display:block; font-size: 12px; font-weight:700; color: var(--ink-2); margin-bottom: 5px; }
  .field input, .field select, .field textarea{
    width:100%; padding: 8px 10px; border: 1px solid var(--hairline); border-radius: var(--radius-s);
    background: var(--surface); outline: none; color: var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus{ border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-tint); }
  .field-row{ display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field textarea{ resize: vertical; min-height: 60px; }

  /* deal detail modal */
  .dd-value{ font-size: 24px; font-weight:800; color: var(--accent-dark); margin-bottom:2px; }
  .dd-meta{ display:flex; flex-wrap:wrap; gap: 8px; margin: 10px 0 16px; }
  .dd-section{ margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--hairline); }
  .dd-section h4{ font-size: 12.5px; text-transform:uppercase; letter-spacing:0.04em; color: var(--ink-muted); margin-bottom: 10px; }
  .note-item{ background: var(--surface-sunken); border-radius: var(--radius-s); padding: 9px 11px; font-size: 12.5px; margin-bottom:7px; }
  .note-item .when{ font-size: 11px; color: var(--ink-muted); margin-top:3px; }
  .add-note-row{ display:flex; gap:8px; margin-top:8px; }
  .add-note-row input{ flex:1; padding:8px 10px; border:1px solid var(--hairline); border-radius: var(--radius-s); outline:none; }
  .task-row{ display:flex; align-items:center; gap:9px; padding: 6px 0; font-size: 13px; }
  .task-row .chk{ width:15px; height:15px; border-radius:4px; border: 1.5px solid var(--ink-muted); cursor:pointer; flex:none; }
  .task-row .chk.done{ background: var(--good); border-color: var(--good); }
  .task-row .t.done{ text-decoration: line-through; color: var(--ink-muted); }

  /* leads */
  .lead-card{ display:flex; align-items:center; gap:12px; padding: 12px 16px; border-bottom: 1px solid var(--hairline); }
  .lead-card:last-child{ border-bottom:none; }
  .lead-avatar{ width:36px; height:36px; border-radius:50%; background: var(--surface-sunken); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color: var(--ink-2); flex:none; }
  .lead-info{ flex:1; min-width:0; }
  .lead-info .n{ font-weight:700; font-size:13.5px; }
  .lead-info .s{ font-size:12px; color: var(--ink-muted); }
  .lead-actions{ display:flex; gap:6px; flex:none; }
  .source-badge{ display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; }
  .source-badge.meta{ background:#eef1ff; color:#3b3fa0; }
  .source-badge.manual{ background: var(--surface-sunken); color: var(--ink-2); }

  .banner{ display:flex; gap:12px; align-items:flex-start; padding: 14px 16px; border-radius: var(--radius-m); background: var(--accent-tint); border:1px solid #d3e4f8; margin-bottom:16px; }
  .banner svg{ width:18px; height:18px; flex:none; color: var(--accent-dark); margin-top:1px; }
  .banner .t{ font-size:13px; color: var(--ink-2); }
  .banner b{ color: var(--ink); }

  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background: var(--ink); color:#fff; padding:11px 18px; border-radius: 999px; font-size:13px; font-weight:600; box-shadow: var(--shadow-pop); z-index: 200; display:flex; align-items:center; gap:8px; }
  .toast svg{ width:15px; height:15px; color: var(--good); }

  .import-steps{ display:flex; gap:6px; margin-bottom:18px; }
  .import-steps .s{ flex:1; text-align:center; font-size:11.5px; font-weight:700; color: var(--ink-muted); padding-bottom:8px; border-bottom: 3px solid var(--hairline); }
  .import-steps .s.active{ color: var(--accent-dark); border-color: var(--accent); }
  .import-steps .s.done{ color: var(--good-text); border-color: var(--good); }
  .dropzone{ border: 2px dashed var(--hairline); border-radius: var(--radius-l); padding: 34px 20px; text-align:center; cursor:pointer; }
  .dropzone:hover{ border-color: var(--accent); background: var(--accent-tint); }
  .dropzone svg{ width: 28px; height:28px; color: var(--ink-muted); margin-bottom:8px; }
  .map-row{ display:grid; grid-template-columns: 160px 1fr; align-items:center; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--hairline); }
  .map-row label{ font-size:12.5px; font-weight:600; }
  .map-row .req{ color: var(--critical); }

  .empty-state{ text-align:center; padding: 60px 20px; color: var(--ink-muted); }
  .empty-state svg{ width:40px; height:40px; margin-bottom: 12px; opacity:0.5; }
  .empty-state h3{ font-size:15px; color: var(--ink); margin-bottom:4px; }

  ::-webkit-scrollbar{ height:9px; width:9px; }
  ::-webkit-scrollbar-thumb{ background: #d6d5cd; border-radius: 999px; }
  ::-webkit-scrollbar-track{ background: transparent; }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>

<div class="shell">
  <nav class="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <div class="brand-name">Fluxo CRM</div>
        <div class="brand-sub">Protótipo local</div>
      </div>
    </div>

    <div class="nav-group-label">Visão geral</div>
    <button class="nav-item active" data-view="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 13h4v8H3zM10 3h4v18h-4zM17 8h4v13h-4z"/></svg>
      Dashboard
    </button>

    <div class="nav-group-label">Vendas</div>
    <button class="nav-item" data-view="deals">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M7 12h14M11 18h10"/></svg>
      Negócios <span class="count" id="nav-count-deals">0</span>
    </button>
    <button class="nav-item" data-view="leads">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.2"/><path d="M5 21c0-4 3.2-6.5 7-6.5s7 2.5 7 6.5"/></svg>
      Leads <span class="count" id="nav-count-leads">0</span>
    </button>
    <button class="nav-item" data-view="tasks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h9"/><path d="M4 6l0 0"/></svg>
      Tarefas <span class="count" id="nav-count-tasks">0</span>
    </button>

    <div class="nav-group-label">Cadastros</div>
    <button class="nav-item" data-view="contacts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.4"/><path d="M5 20c0-4 3-6.5 7-6.5s7 2.5 7 6.5"/></svg>
      Pessoas
    </button>
    <button class="nav-item" data-view="companies">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 21V5a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v16M12 21v-8a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v8M8 8h0M8 12h0M8 16h0"/></svg>
      Empresas
    </button>

    <div class="nav-group-label">Sistema</div>
    <button class="nav-item" data-view="import">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
      Importar dados
    </button>

    <div class="sidebar-foot">
      Dados salvos neste navegador.<br>Versão de teste — ainda não publicada na internet.
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div class="topbar-spacer"></div>
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="global-search" placeholder="Buscar negócio, pessoa ou empresa…" />
      </div>
      <button class="btn btn-primary" id="btn-new-deal">

        Novo negócio
      </button>
      <div class="avatar" id="user-avatar">?</div>

</div>

<div id="toast-root"></div>

<script>
/* =========================================================================
   FLUXO CRM — protótipo local (single file, localStorage)
   ========================================================================= */

const STORAGE_KEY = "fluxo_crm_data_v1";
const STAGES = [
  { id: "novo",        name: "Novo lead",      color: "#86b6ef" },
  { id: "contato",     name: "Contato feito",  color: "#5598e7" },
  { id: "proposta",    name: "Proposta",       color: "#2a78d6" },
  { id: "negociacao",  name: "Negociação",     color: "#184f95" },
  { id: "ganho",       name: "Ganho",          color: "#0ca30c" },
  { id: "perdido",     name: "Perdido",        color: "#d03b3b" },
];
const uid = () => Math.random().toString(36).slice(2, 10);
const todayISO = () => new Date().toISOString().slice(0,10);
const BRL = n => (n||0).toLocaleString("pt-BR", { style:"currency", currency:"BRL", maximumFractionDigits:0 });
const fmtDate = iso => { if(!iso) return "—"; const d = new Date(iso+"T00:00:00"); return d.toLocaleDateString("pt-BR", { day:"2-digit", month:"short" }); };
const initials = name => (name||"?").split(" ").filter(Boolean).slice(0,2).map(s=>s[0].toUpperCase()).join("");

function seedData(){

    { id: uid(), name: "Grupo Marmore Construções", segment: "Construção civil", phone: "(11) 3355-2210", site: "marmoreconstrucoes.com.br" },

    { id: uid(), name: "Norte Consultoria Financeira", segment: "Serviços financeiros", phone: "(21) 3020-1187", site: "norteconsultoria.com" },
    { id: uid(), name: "Padaria Trigo Dourado", segment: "Alimentício", phone: "(11) 2288-4470", site: "" },
    { id: uid(), name: "Estúdio Alma Arquitetura", segment: "Arquitetura", phone: "(11) 9977-2200", site: "almaarquitetura.com.br" },
  ];
  const c = companies;
  const contacts = [

    { id: uid(), name: "Diego Fontenele", email: "diego@vitalledist.com.br", phone: "(11) 97722-3344", role: "Diretor comercial", companyId: c[1].id },
    { id: uid(), name: "Marcos Vinícius Lima", email: "marcos.lima@norteconsultoria.com", phone: "(21) 96655-8899", role: "Sócio", companyId: c[2].id },
    { id: uid(), name: "Ana Paula Ribeiro", email: "ana@trigodourado.com.br", phone: "(11) 95544-7788", role: "Proprietária", companyId: c[3].id },
    { id: uid(), name: "Felipe Torres", email: "felipe@almaarquitetura.com.br", phone: "(11) 94433-6655", role: "Arquiteto responsável", companyId: c[4].id },
    { id: uid(), name: "Juliana Prado", email: "juliana.prado@gmail.com", phone: "(11) 93322-5544", role: "Interessada", companyId: null },
  ];
  const ct = contacts;
  const deals = [
    { id: uid(), title: "Fornecimento de insumos — obra Zona Sul", value: 48000, stage: "proposta", contactId: ct[0].id, companyId: c[0].id, owner:"Você", expectedClose: addDays(6), createdAt: addDays(-14), notes:[{ text:"Cliente pediu revisão do prazo de entrega.", when: addDays(-2) }], tasks:[{ id:uid(), title:"Enviar proposta revisada", due: addDays(1), done:false }] },
    { id: uid(), title: "Contrato anual de distribuição", value: 132000, stage: "negociacao", contactId: ct[1].id, companyId: c[1].id, owner:"Você", expectedClose: addDays(10), createdAt: addDays(-30), notes:[{ text:"Já alinhamos valores, falta assinatura da diretoria.", when: addDays(-5) }], tasks:[{ id:uid(), title:"Ligar para confirmar assinatura", due: addDays(-1), done:false }] },
    { id: uid(), title: "Consultoria financeira trimestral", value: 21000, stage: "contato", contactId: ct[2].id, companyId: c[2].id, owner:"Você", expectedClose: addDays(18), createdAt: addDays(-6), notes:[], tasks:[{ id:uid(), title:"Agendar reunião de diagnóstico", due: addDays(2), done:false }] },
    { id: uid(), title: "Reforma e ampliação da padaria", value: 15500, stage: "novo", contactId: ct[3].id, companyId: c[3].id, owner:"Você", expectedClose: addDays(25), createdAt: addDays(-2), notes:[], tasks:[] },
    { id: uid(), title: "Projeto executivo — escritório novo", value: 38000, stage: "ganho", contactId: ct[4].id, companyId: c[4].id, owner:"Você", expectedClose: addDays(-3), createdAt: addDays(-40), notes:[{ text:"Fechado! Início previsto para o próximo mês.", when: addDays(-3) }], tasks:[] },
    { id: uid(), title: "Consultoria pontual — abertura de CNPJ", value: 6000, stage: "perdido", contactId: ct[5].id, companyId: null, owner:"Você", expectedClose: addDays(-10), createdAt: addDays(-45), notes:[{ text:"Cliente optou por outro fornecedor mais barato.", when: addDays(-10) }], tasks:[] },
    { id: uid(), title: "Locação de equipamentos — 2ª obra", value: 27500, stage: "proposta", contactId: ct[0].id, companyId: c[0].id, owner:"Você", expectedClose: addDays(4), createdAt: addDays(-9), notes:[], tasks:[{ id:uid(), title:"Follow-up da proposta enviada", due: addDays(0), done:false }] },
  ];
  const tasksExtra = [];
  const leads = [
    { id: uid(), name: "Roberta Almeida", phone: "(11) 99888-1234", email: "roberta.almeida@outlook.com", source: "Instagram Ads", campaign: "Campanha — Reforma de fachadas", status: "novo", createdAt: addDays(-1) },
    { id: uid(), name: "Cláudio Nishimura", phone: "(11) 98111-4455", email: "claudio.n@gmail.com", source: "Facebook Ads", campaign: "Campanha — Distribuição regional", status: "novo", createdAt: addDays(0) },
    { id: uid(), name: "Patrícia Gomes", phone: "(21) 97222-3344", email: "patricia.gomes@hotmail.com", source: "Manual", campaign: "Indicação", status: "qualificando", createdAt: addDays(-4) },
  ];
  return { companies, contacts, deals, leads, meta: { name: "Sua empresa", connectedMeta: false }, version: 1 };
}
function addDays(n){ const d = new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }

let DATA = load();
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  const seeded = seedData();
  save(seeded);
  return seeded;
}
function save(d = DATA){ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

function getContact(id){ return DATA.contacts.find(c=>c.id===id); }
function getCompany(id){ return DATA.companies.find(c=>c.id===id); }
function dealsForContact(id){ return DATA.deals.filter(d=>d.contactId===id); }
function dealsForCompany(id){ return DATA.deals.filter(d=>d.companyId===id); }
function stageInfo(id){ return STAGES.find(s=>s.id===id); }

/* ---------------------------- routing ---------------------------- */
let currentView = "dashboard";
const viewTitles = { dashboard:"Dashboard", deals:"Negócios", leads:"Leads", tasks:"Tarefas", contacts:"Pessoas", companies:"Empresas", import:"Importar dados" };

document.querySelectorAll(".nav-item").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".nav-item").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentView = btn.dataset.view;
    document.getElementById("page-title").textContent = viewTitles[currentView];
    render();
  });
});
document.getElementById("btn-new-deal").addEventListener("click", ()=> openDealForm());
document.getElementById("user-avatar").textContent = initials(DATA.meta.name).slice(0,2) || "V";

document.getElementById("global-search").addEventListener("input", (e)=>{
  const q = e.target.value.trim().toLowerCase();
  if(!q) return;
  // jump to deals view and let it filter
  if(currentView !== "deals"){
    document.querySelector('[data-view="deals"]').click();
  }
  window.__searchQuery = q;
  render();
});

function updateNavCounts(){
  document.getElementById("nav-count-deals").textContent = DATA.deals.filter(d=>d.stage!=="ganho" && d.stage!=="perdido").length;
  document.getElementById("nav-count-leads").textContent = DATA.leads.filter(l=>l.status!=="convertido" && l.status!=="descartado").length;
  const openTasks = DATA.deals.flatMap(d=>d.tasks.map(t=>({...t, dealId:d.id}))).filter(t=>!t.done);
  document.getElementById("nav-count-tasks").textContent = openTasks.length;
}

function render(){
  updateNavCounts();
  const root = document.getElementById("view-root");
  root.innerHTML = "";
  if(currentView === "dashboard") root.appendChild(renderDashboard());
  else if(currentView === "deals") root.appendChild(renderDeals());
  else if(currentView === "leads") root.appendChild(renderLeads());
  else if(currentView === "tasks") root.appendChild(renderTasks());
  else if(currentView === "contacts") root.appendChild(renderContacts());
  else if(currentView === "companies") root.appendChild(renderCompanies());
  else if(currentView === "import") root.appendChild(renderImport());
}

/* ============================== DASHBOARD ============================== */
function renderDashboard(){
  const wrap = el("div");
  const openDeals = DATA.deals.filter(d=>d.stage!=="ganho" && d.stage!=="perdido");
  const wonDeals = DATA.deals.filter(d=>d.stage==="ganho");
  const lostDeals = DATA.deals.filter(d=>d.stage==="perdido");
  const pipelineValue = openDeals.reduce((s,d)=>s+d.value,0);
  const closedTotal = wonDeals.length + lostDeals.length;
  const winRate = closedTotal ? Math.round((wonDeals.length/closedTotal)*100) : 0;
  const avgTicket = wonDeals.length ? wonDeals.reduce((s,d)=>s+d.value,0)/wonDeals.length : 0;

  wrap.innerHTML = `
    <div class="view-head">
      <div>
        <div class="eyebrow">Visão geral</div>
        <h2>Como está o funil agora</h2>
      </div>
    </div>
    <div class="stat-row">
      ${statTile("Valor em aberto no funil", BRL(pipelineValue), `${openDeals.length} negócios em andamento`, null)}
      ${statTile("Negócios abertos", openDeals.length, "ativos hoje", null)}
      ${statTile("Taxa de conversão", winRate + "%", `${wonDeals.length} ganhos de ${closedTotal} fechados`, winRate>=50?"up":"down")}
      ${statTile("Ticket médio (ganhos)", BRL(avgTicket), "por negócio fechado", null)}
    </div>
    <div class="grid-2">
      <div class="card panel">
        <h3>Funil de vendas</h3>
        <div class="sub">Quantidade e valor de negócios por etapa</div>
        <div id="funnel-holder"></div>
      </div>
      <div class="card panel">
        <h3>Tarefas de hoje</h3>
        <div class="sub">O que precisa da sua atenção</div>
        <div id="today-holder"></div>
      </div>
    </div>
    <div class="grid-2" style="margin-top:14px;">
      <div class="card panel">
        <h3>Negócios ganhos por mês</h3>
        <div class="sub">Últimos 6 meses</div>
        <div id="won-chart-holder"></div>
      </div>
      <div class="card panel">
        <h3>Leads recentes</h3>
        <div class="sub">Últimos leads recebidos (inclusive da Meta)</div>
        <div id="recent-leads-holder"></div>
      </div>
    </div>
  `;

  wrap.querySelector("#funnel-holder").appendChild(renderFunnelChart());
  wrap.querySelector("#today-holder").appendChild(renderTodayTasks());
  wrap.querySelector("#won-chart-holder").appendChild(renderWonChart());
  wrap.querySelector("#recent-leads-holder").appendChild(renderRecentLeads());
  return wrap;
}

function statTile(label, value, deltaText, dir){
  return `
    <div class="card stat-tile">
      <div class="label">${label}</div>
      <div class="value tabular">${value}</div>
      ${deltaText ? `<div class="delta ${dir==='up'?'up':dir==='down'?'down':''}">
        ${dir ? (dir==='up' ? arrowUp() : arrowDown()) : ""}${deltaText}
      </div>` : ""}
    </div>
  `;
}
function arrowUp(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 19V5M5 12l7-7 7 7"/></svg>`; }
function arrowDown(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12l7 7 7-7"/></svg>`; }

function renderFunnelChart(){
  const box = el("div");
  const stagesForFunnel = STAGES.filter(s=>s.id!=="perdido");
  const maxVal = Math.max(1, ...stagesForFunnel.map(s => DATA.deals.filter(d=>d.stage===s.id).reduce((sum,d)=>sum+d.value,0)));
  stagesForFunnel.forEach(s=>{
    const inStage = DATA.deals.filter(d=>d.stage===s.id);
    const val = inStage.reduce((sum,d)=>sum+d.value,0);
    const pct = Math.max(4, Math.round((val/maxVal)*100));
    const row = el("div", "funnel-row");
    row.innerHTML = `
      <div class="stage-label">${s.name}</div>
      <div class="funnel-track"><div class="funnel-fill" style="width:${pct}%; background:${s.color}"></div></div>
      <div class="meta"><b>${inStage.length}</b> · ${BRL(val)}</div>
    `;
    box.appendChild(row);
  });
  return box;
}

function renderTodayTasks(){
  const box = el("div", "today-list");
  const all = DATA.deals.flatMap(d=>d.tasks.map(t=>({...t, dealId:d.id, dealTitle:d.title})));
  const open = all.filter(t=>!t.done).sort((a,b)=> a.due.localeCompare(b.due));
  if(!open.length){
    box.innerHTML = `<div class="empty-note">Nenhuma tarefa pendente. 🎉</div>`;
    return box;
  }
  const today = todayISO();
  open.slice(0,6).forEach(t=>{
    const overdue = t.due < today;
    const row = el("div", "today-item" + (overdue?" overdue":""));
    row.innerHTML = `
      <div class="chk"></div>
      <div class="txt">
        <div>${t.title}</div>
        <div class="rel">${dealLink(t.dealTitle)} · ${overdue ? "atrasada — " : ""}${fmtDate(t.due)}</div>
      </div>
    `;
    row.querySelector(".chk").addEventListener("click", ()=>{
      toggleTask(t.dealId, t.id);
      render();
    });
    box.appendChild(row);
  });
  return box;
}
function dealLink(title){ return `<span>${title}</span>`; }

function renderWonChart(){
  const box = el("div", "bars");
  const months = [];
  const now = new Date();
  for(let i=5;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push(d);
  }
  const values = months.map(m=>{
    return DATA.deals.filter(d=>{
      if(d.stage!=="ganho") return false;
      const dd = new Date(d.expectedClose+"T00:00:00");
      return dd.getFullYear()===m.getFullYear() && dd.getMonth()===m.getMonth();
    }).reduce((s,d)=>s+d.value,0);
  });
  const max = Math.max(1, ...values);
  months.forEach((m,i)=>{
    const h = Math.max(4, Math.round((values[i]/max)*100));
    const col = el("div", "bar-col");
    col.innerHTML = `
      <div class="bar" style="height:${h}%"><div class="tip">${BRL(values[i])}</div></div>
      <div class="x-label">${m.toLocaleDateString("pt-BR",{month:"short"}).replace(".","")}</div>
    `;
    box.appendChild(col);
  });
  return box;
}

function renderRecentLeads(){
  const box = el("div");
  const recent = [...DATA.leads].sort((a,b)=>b.createdAt.localeCompare(a.createdAt)).slice(0,4);
  if(!recent.length){ box.innerHTML = `<div class="empty-note">Nenhum lead recebido ainda.</div>`; return box; }
  recent.forEach(l=>{
    const row = el("div", "lead-card");
    row.style.padding = "9px 0";
    row.innerHTML = `
      <div class="lead-avatar">${initials(l.name)}</div>
      <div class="lead-info">
        <div class="n">${l.name}</div>
        <div class="s">${leadSourceBadge(l.source)} ${l.campaign}</div>
      </div>
    `;
    box.appendChild(row);
  });
  return box;
}
function leadSourceBadge(source){
  const isMeta = source==="Instagram Ads" || source==="Facebook Ads";
  return `<span class="source-badge ${isMeta?'meta':'manual'}">${metaGlyph(isMeta)}${source}</span>`;
}
function metaGlyph(isMeta){ return isMeta ? "◆ " : "· "; }

/* ============================== DEALS (KANBAN) ============================== */
function renderDeals(){
  const wrap = el("div");
  const q = window.__searchQuery || "";
  window.__searchQuery = "";
  let deals = DATA.deals;
  if(q){
    deals = deals.filter(d => d.title.toLowerCase().includes(q)
      || (getContact(d.contactId)?.name||"").toLowerCase().includes(q)
      || (getCompany(d.companyId)?.name||"").toLowerCase().includes(q));
  }
  const totalOpen = deals.filter(d=>d.stage!=="ganho"&&d.stage!=="perdido").reduce((s,d)=>s+d.value,0);

  wrap.innerHTML = `
    <div class="view-head">
      <div>
        <div class="eyebrow">Funil de vendas</div>
        <h2>Negócios <span style="color:var(--ink-muted); font-weight:600; font-size:15px;">— ${BRL(totalOpen)} em aberto</span></h2>
      </div>
      <div class="view-actions">
        <button class="btn" id="btn-clear-search-deals" style="${q?'':'display:none'}">Limpar busca</button>
        <button class="btn btn-primary" id="btn-new-deal-2">+ Novo negócio</button>
      </div>
    </div>
    <div class="board" id="board"></div>
  `;
  wrap.querySelector("#btn-new-deal-2").addEventListener("click", ()=>openDealForm());
  const clearBtn = wrap.querySelector("#btn-clear-search-deals");
  if(clearBtn) clearBtn.addEventListener("click", ()=>{ document.getElementById("global-search").value=""; render(); });

  const board = wrap.querySelector("#board");
  STAGES.forEach(stage=>{
    const stageDeals = deals.filter(d=>d.stage===stage.id);
    const sum = stageDeals.reduce((s,d)=>s+d.value,0);
    const col = el("div", "col");
    col.innerHTML = `
      <div class="col-head"><div class="dot" style="background:${stage.color}"></div><div class="name">${stage.name}</div><div class="n">${stageDeals.length}</div></div>
      <div class="col-sum tabular">${BRL(sum)}</div>
      <div class="col-body" data-stage="${stage.id}"></div>
    `;
    const body = col.querySelector(".col-body");
    stageDeals.forEach(d=> body.appendChild(dealCard(d)));
    board.appendChild(col);

    body.addEventListener("dragover", e=>{ e.preventDefault(); body.classList.add("drag-over"); });
    body.addEventListener("dragleave", ()=> body.classList.remove("drag-over"));
    body.addEventListener("drop", e=>{
      e.preventDefault();
      body.classList.remove("drag-over");
      const dealId = e.dataTransfer.getData("text/deal-id");
      const deal = DATA.deals.find(x=>x.id===dealId);
      if(deal && deal.stage !== stage.id){
        deal.stage = stage.id;
        save();
        render();
        toast(`Movido para "${stage.name}"`);
      }
    });
  });
  return wrap;
}

function dealCard(d){
  const card = el("div", "deal-card");
  card.draggable = true;
  const contact = getContact(d.contactId);
  const late = d.expectedClose < todayISO() && d.stage!=="ganho" && d.stage!=="perdido";
  card.innerHTML = `
    <div class="title">${d.title}</div>
    <div class="value">${BRL(d.value)}</div>
    <div class="who">${contact ? contact.name : "Sem contato vinculado"}</div>
    <div class="foot">
      <span class="due ${late?'late':''}">${late?'atrasado · ':''}${fmtDate(d.expectedClose)}</span>
    </div>
  `;
  card.addEventListener("dragstart", e=>{ e.dataTransfer.setData("text/deal-id", d.id); card.classList.add("dragging"); });
  card.addEventListener("dragend", ()=> card.classList.remove("dragging"));
  card.addEventListener("click", ()=> openDealDetail(d.id));
  return card;
}

function openDealForm(existing){
  const contactsOpts = DATA.contacts.map(c=>`<option value="${c.id}" ${existing&&existing.contactId===c.id?'selected':''}>${c.name}</option>`).join("");
  const companyOpts = DATA.companies.map(c=>`<option value="${c.id}" ${existing&&existing.companyId===c.id?'selected':''}>${c.name}</option>`).join("");
  const stageOpts = STAGES.map(s=>`<option value="${s.id}" ${existing&&existing.stage===s.id?'selected':''}>${s.name}</option>`).join("");

  const body = `
    <div class="field"><label>Título do negócio</label><input id="f-title" value="${existing?.title||''}" placeholder="Ex: Contrato de manutenção anual"/></div>
    <div class="field-row">
      <div class="field"><label>Valor (R$)</label><input id="f-value" type="number" value="${existing?.value||''}" placeholder="0"/></div>
      <div class="field"><label>Etapa</label><select id="f-stage">${stageOpts}</select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Pessoa de contato</label><select id="f-contact"><option value="">— Selecionar —</option>${contactsOpts}</select></div>
      <div class="field"><label>Empresa</label><select id="f-company"><option value="">— Selecionar —</option>${companyOpts}</select></div>
    </div>
    <div class="field"><label>Previsão de fechamento</label><input id="f-close" type="date" value="${existing?.expectedClose||todayISO()}"/></div>
  `;
  openModal({
    title: existing ? "Editar negócio" : "Novo negócio",
    bodyHtml: body,
    confirmText: existing ? "Salvar alterações" : "Criar negócio",
    onConfirm: (m)=>{
      const title = m.querySelector("#f-title").value.trim();
      if(!title){ m.querySelector("#f-title").focus(); return false; }
      const value = parseFloat(m.querySelector("#f-value").value)||0;
      const stage = m.querySelector("#f-stage").value;
      const contactId = m.querySelector("#f-contact").value || null;
      const companyId = m.querySelector("#f-company").value || null;
      const expectedClose = m.querySelector("#f-close").value;
      if(existing){
        Object.assign(existing, { title, value, stage, contactId, companyId, expectedClose });
      } else {
        DATA.deals.push({ id: uid(), title, value, stage, contactId, companyId, expectedClose, owner:"Você", createdAt: todayISO(), notes:[], tasks:[] });
      }
      save();
      render();
      toast(existing ? "Negócio atualizado" : "Negócio criado");
      return true;
    }
  });
}

function openDealDetail(dealId){
  const d = DATA.deals.find(x=>x.id===dealId);
  if(!d) return;
  const contact = getContact(d.contactId);
  const company = getCompany(d.companyId);
  const stage = stageInfo(d.stage);

  const body = el("div");
  body.innerHTML = `
    <div class="dd-value tabular">${BRL(d.value)}</div>
    <div style="font-size:13px; color:var(--ink-2)">${contact ? contact.name : "Sem contato"} ${company ? "· " + company.name : ""}</div>

function convertLeadToDeal(lead){
  let contact = DATA.contacts.find(c=>c.email && c.email===lead.email);

  }
  DATA.deals.push({ id: uid(), title: `Oportunidade — ${lead.name}`, value: 0, stage:"novo", contactId: contact.id, companyId: null, owner:"Você", expectedClose: addDays(14), createdAt: todayISO(), notes:[{text:`Convertido do lead recebido via ${lead.source} (${lead.campaign}).`, when: todayISO()}], tasks:[{id:uid(), title:"Primeiro contato", due: todayISO(), done:false}] });

function renderTasks(){
  const wrap = el("div");
  const all = DATA.deals.flatMap(d=>d.tasks.map(t=>({...t, dealId:d.id, dealTitle:d.title})));
  const today = todayISO();
  const overdue = all.filter(t=>!t.done && t.due<today);
  const todayT = all.filter(t=>!t.done && t.due===today);
  const upcoming = all.filter(t=>!t.done && t.due>today).sort((a,b)=>a.due.localeCompare(b.due));
  const done = all.filter(t=>t.done);

  wrap.innerHTML = `
    <div class="view-head"><div><div class="eyebrow">Produtividade</div><h2>Tarefas</h2></div></div>
    <div class="grid-2" style="grid-template-columns: 1fr 1fr;">
      <div class="card panel">
        <h3>Atrasadas (${overdue.length})</h3>
        <div id="tk-overdue"></div>
      </div>
      <div class="card panel">
        <h3>Hoje (${todayT.length})</h3>
        <div id="tk-today"></div>
      </div>
    </div>
    <div class="grid-2" style="grid-template-columns: 1fr 1fr; margin-top:14px;">
      <div class="card panel">
        <h3>Próximas (${upcoming.length})</h3>
        <div id="tk-upcoming"></div>
      </div>
      <div class="card panel">
        <h3>Concluídas (${done.length})</h3>
        <div id="tk-done"></div>
      </div>
    </div>
  `;
  const fill = (sel, list) => {
    const holder = wrap.querySelector(sel);
    if(!list.length){ holder.innerHTML = `<div class="empty-note">Nada por aqui.</div>`; return; }
    list.forEach(t=>{
      const row = el("div", "task-row");
      row.innerHTML = `<div class="chk ${t.done?'done':''}"></div><div class="t ${t.done?'done':''}" style="flex:1">${t.title} <span style="color:var(--ink-muted); font-weight:400;">— ${t.dealTitle}</span></div><div style="font-size:11.5px;color:var(--ink-muted)">${fmtDate(t.due)}</div>`;
      row.querySelector(".chk").addEventListener("click", ()=>{ toggleTask(t.dealId, t.id); render(); });
      holder.appendChild(row);
    });
  };
  fill("#tk-overdue", overdue);
  fill("#tk-today", todayT);
  fill("#tk-upcoming", upcoming);
  fill("#tk-done", done.slice(0,10));
  return wrap;
}

function openImportWizard(){
  importState = { step:1, rows: [], headers: [], mapping: {} };
  const body = el("div");
  renderImportStep(body);
  openModal({ title:"Importar do Agendor", bodyEl: body, wide:true, noFooter:true });
}

function renderImportStep(body){
  body.innerHTML = "";
  const steps = el("div", "import-steps");
  ["1. Carregar arquivo","2. Mapear colunas","3. Conferir e importar"].forEach((label,i)=>{
    const n = i+1;
    const s = el("div", "s " + (n===importState.step ? "active" : n<importState.step ? "done" : ""));
    s.textContent = label;
    steps.appendChild(s);
  });
  body.appendChild(steps);

  if(importState.step === 1) return stepUpload(body);
  if(importState.step === 2) return stepMap(body);
  if(importState.step === 3) return stepConfirm(body);
}

function stepUpload(body){
  const dz = el("div", "dropzone");
  dz.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
    <div style="font-weight:700; margin-bottom:4px;">Clique para selecionar o arquivo CSV</div>
    <div style="font-size:12.5px; color:var(--ink-muted)">Exportado do Agendor (Negócios, Pessoas ou Empresas)</div>
    <input type="file" accept=".csv,text/csv" style="display:none" id="import-file-input"/>
  `;
  dz.addEventListener("click", ()=> dz.querySelector("#import-file-input").click());
  dz.querySelector("#import-file-input").addEventListener("change", (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      const parsed = parseCSV(reader.result);
      if(!parsed.rows.length){ toast("Não foi possível ler o arquivo"); return; }
      importState.headers = parsed.headers;
      importState.rows = parsed.rows;
      autoGuessMapping();
      importState.step = 2;
      renderImportStep(body);
    };
    reader.readAsText(file, "utf-8");
  });
  body.appendChild(dz);

  const orBox = el("div");
  orBox.style.cssText = "margin-top:14px; text-align:center; font-size:12px; color:var(--ink-muted);";
  orBox.innerHTML = `Não tem o arquivo agora? <a href="#" id="use-sample" style="color:var(--accent-dark); font-weight:700; text-decoration:none;">Usar um arquivo de exemplo</a>`;
  orBox.querySelector("#use-sample").addEventListener("click", (e)=>{
    e.preventDefault();
    const sampleCsv = `Título,Empresa,Contato,Email,Telefone,Valor,Etapa,Previsão de fechamento
Manutenção predial 2026,Grupo Zenith Facilities,Carla Nogueira,carla@zenithfacilities.com.br,(11) 98765-0011,54000,Proposta,2026-08-10
Fornecimento de peças,Auto Peças União,Ricardo Matos,ricardo@autopecasuniao.com.br,(11) 91234-5566,18500,Negociação,2026-07-20
Consultoria de processos,Zenith Facilities,Carla Nogueira,carla@zenithfacilities.com.br,(11) 98765-0011,9000,Contato feito,2026-08-01`;
    const parsed = parseCSV(sampleCsv);
    importState.headers = parsed.headers;
    importState.rows = parsed.rows;
    autoGuessMapping();
    importState.step = 2;
    renderImportStep(body);
  });
  body.appendChild(orBox);
}

function parseCSV(text){
  const lines = text.replace(/\r\n/g,"\n").split("\n").filter(l=>l.trim().length);
  if(!lines.length) return { headers:[], rows:[] };
  const splitLine = (line)=>{
    const out = []; let cur=""; let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch = line[i];
      if(ch === '"'){ inQ = !inQ; continue; }
      if(ch === "," && !inQ){ out.push(cur); cur=""; continue; }
      cur += ch;
    }
    out.push(cur);
    return out.map(s=>s.trim());
  };
  const headers = splitLine(lines[0]);
  const rows = lines.slice(1).map(l=>{
    const cells = splitLine(l);
    const obj = {};
    headers.forEach((h,i)=> obj[h] = cells[i] ?? "");
    return obj;
  });
  return { headers, rows };
}

function autoGuessMapping(){
  const guesses = {
    dealTitle: ["título","titulo","negócio","negocio","deal","nome do negócio"],
    dealValue: ["valor","value","valor do negócio"],
    stage: ["etapa","funil","stage","status"],
    companyName: ["empresa","company","organização"],
    contactName: ["contato","pessoa","nome do contato","cliente"],
    contactEmail: ["email","e-mail"],
    contactPhone: ["telefone","phone","celular"],
    expectedClose: ["previsão","previsao","data prevista","fechamento"],
  };
  importState.mapping = {};
  IMPORT_FIELDS.forEach(f=>{
    const opts = guesses[f.key] || [];
    const found = importState.headers.find(h => opts.some(o => h.toLowerCase().includes(o)));
    importState.mapping[f.key] = found || "";
  });
}

function stepMap(body){
  const holder = el("div");
  holder.innerHTML = `<div class="sub" style="margin-bottom:10px;">Encontramos ${importState.rows.length} linha(s). Diga a que corresponde cada coluna.</div>`;
  const headerOpts = `<option value="">— Não importar —</option>` + importState.headers.map(h=>`<option value="${h}">${h}</option>`).join("");
  IMPORT_FIELDS.forEach(f=>{
    const row = el("div", "map-row");
    row.innerHTML = `
      <label>${f.label}${f.required?' <span class="req">*</span>':''}</label>
      <select data-field="${f.key}">${headerOpts}</select>
    `;
    const sel = row.querySelector("select");
    sel.value = importState.mapping[f.key] || "";
    sel.addEventListener("change", ()=> importState.mapping[f.key] = sel.value);
    holder.appendChild(row);
  });
  body.appendChild(holder);

  const actions = el("div");
  actions.style.cssText = "display:flex; justify-content:space-between; margin-top:18px;";
  actions.innerHTML = `<button class="btn" id="back">Voltar</button><button class="btn btn-primary" id="next">Continuar</button>`;
  actions.querySelector("#back").addEventListener("click", ()=>{ importState.step=1; renderImportStep(body); });
  actions.querySelector("#next").addEventListener("click", ()=>{
    if(!importState.mapping.dealTitle){ toast("Selecione ao menos a coluna do título do negócio"); return; }
    importState.step = 3;
    renderImportStep(body);
  });
  body.appendChild(actions);
}

function stepConfirm(body){
  const preview = importState.rows.slice(0,5);
  const cols = IMPORT_FIELDS.filter(f=>importState.mapping[f.key]);
  const table = el("div", "table-wrap");
  table.innerHTML = `
    <table>
      <thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join("")}</tr></thead>
      <tbody>
        ${preview.map(r=>`<tr>${cols.map(c=>`<td>${r[importState.mapping[c.key]]||""}</td>`).join("")}</tr>`).join("")}
      </tbody>
    </table>
  `;
  body.appendChild(el("div", "sub")).textContent = `Confira uma amostra de ${preview.length} de ${importState.rows.length} linha(s) antes de importar.`;
  body.appendChild(table);

  const actions = el("div");
  actions.style.cssText = "display:flex; justify-content:space-between; margin-top:18px;";
  actions.innerHTML = `<button class="btn" id="back">Voltar</button><button class="btn btn-primary" id="confirm">Importar ${importState.rows.length} negócio(s)</button>`;
  actions.querySelector("#back").addEventListener("click", ()=>{ importState.step=2; renderImportStep(body); });
  actions.querySelector("#confirm").addEventListener("click", ()=>{
    const result = runImport();
    closeModal();
    render();
    toast(`Importação concluída: ${result.deals} negócios, ${result.contacts} pessoas, ${result.companies} empresas`);
  });
  body.appendChild(actions);
}

function guessStageId(raw){
  if(!raw) return "novo";
  const s = raw.toLowerCase();
  if(s.includes("ganho") || s.includes("won") || s.includes("fechado")) return "ganho";
  if(s.includes("perdid") || s.includes("lost")) return "perdido";
  if(s.includes("negocia")) return "negociacao";
  if(s.includes("proposta")) return "proposta";
  if(s.includes("contato")) return "contato";
  return "novo";
}

function runImport(){
  const m = importState.mapping;
  let newDeals=0, newContacts=0, newCompanies=0;
  importState.rows.forEach(r=>{
    const title = m.dealTitle ? r[m.dealTitle] : "";
    if(!title) return;
    let companyId = null;
    const companyName = m.companyName ? r[m.companyName] : "";
    if(companyName){
      let company = DATA.companies.find(c=>c.name.toLowerCase()===companyName.toLowerCase());
      if(!company){ company = { id: uid(), name: companyName, segment:"", phone:"", site:"" }; DATA.companies.push(company); newCompanies++; }
      companyId = company.id;
    }
    let contactId = null;
    const contactName = m.contactName ? r[m.contactName] : "";
    const contactEmail = m.contactEmail ? r[m.contactEmail] : "";
    if(contactName){
      let contact = DATA.contacts.find(c=> (contactEmail && c.email===contactEmail) || c.name.toLowerCase()===contactName.toLowerCase());
      if(!contact){
        contact = { id: uid(), name: contactName, email: contactEmail||"", phone: m.contactPhone ? r[m.contactPhone] : "", role:"", companyId };
        DATA.contacts.push(contact);
        newContacts++;
      }
      contactId = contact.id;
    }
    const value = m.dealValue ? parseFloat((r[m.dealValue]||"0").replace(/[^\d.,-]/g,"").replace(",",".")) || 0 : 0;
    const stage = guessStageId(m.stage ? r[m.stage] : "");
    const expectedClose = m.expectedClose && /^\d{4}-\d{2}-\d{2}/.test(r[m.expectedClose]) ? r[m.expectedClose].slice(0,10) : addDays(14);
    DATA.deals.push({ id: uid(), title, value, stage, contactId, companyId, owner:"Você", expectedClose, createdAt: todayISO(), notes:[{text:"Importado do Agendor.", when: todayISO()}], tasks:[] });
    newDeals++;
  });
  save();
  return { deals:newDeals, contacts:newContacts, companies:newCompanies };
}

/* ============================== SHARED UI HELPERS ============================== */
function el(tag, cls){ const e = document.createElement(tag); if(cls) e.className = cls; return e; }
function emptyState(title, sub){
  return `<div class="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    <h3>${title}</h3><div>${sub}</div>
  </div>`;
}

function openModal({ title, bodyHtml, bodyEl, confirmText, onConfirm, wide, noFooter, extraFooterHtml, onExtra }){
  const root = document.getElementById("modal-root");
  const overlay = el("div", "overlay");
  const modal = el("div", "modal" + (wide?" wide":""));
  const head = el("div", "modal-head");
  head.innerHTML = `<h3>${title}</h3>`;
  const closeBtn = el("button", "icon-btn");
  closeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>`;
  closeBtn.addEventListener("click", closeModal);
  head.appendChild(closeBtn);
  const body = el("div", "modal-body");
  if(bodyEl) body.appendChild(bodyEl); else body.innerHTML = bodyHtml || "";
  modal.appendChild(head); modal.appendChild(body);

  if(!noFooter){
    const foot = el("div", "modal-foot");
    if(extraFooterHtml){ const ex = el("div"); ex.innerHTML = extraFooterHtml; ex.style.marginRight="auto"; foot.appendChild(ex); ex.querySelector("button")?.addEventListener("click", ()=> onExtra && onExtra(modal)); }
    const cancel = el("button", "btn"); cancel.textContent = "Cancelar"; cancel.addEventListener("click", closeModal);
    const confirm = el("button", "btn btn-primary"); confirm.textContent = confirmText || "Salvar";
    confirm.addEventListener("click", ()=>{ const ok = onConfirm ? onConfirm(modal) : true; if(ok !== false) closeModal(); });
    foot.appendChild(cancel); foot.appendChild(confirm);
    modal.appendChild(foot);
  }
  overlay.appendChild(modal);
  overlay.addEventListener("mousedown", (e)=>{ if(e.target === overlay) closeModal(); });
  root.innerHTML = ""; root.appendChild(overlay);
  const firstInput = modal.querySelector("input, select, textarea");
  if(firstInput) setTimeout(()=>firstInput.focus(), 30);
}
function closeModal(){ document.getElementById("modal-root").innerHTML = ""; }

let toastTimer;
function toast(msg){
  const root = document.getElementById("toast-root");
  clearTimeout(toastTimer);
  root.innerHTML = `<div class="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>${msg}</div>`;
  toastTimer = setTimeout(()=> root.innerHTML = "", 2600);
}

document.addEventListener("keydown", (e)=>{ if(e.key === "Escape") closeModal(); });

render();
</script>
